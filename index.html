<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakMart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.navbar{
    background:#f85606;
}
.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}
.hero{
    background:#fff;
    padding:60px 20px;
    text-align:center;
}
.product-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}
.product-card:hover{
    transform:translateY(-5px);
}
.product-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}
.price{
    color:#f85606;
    font-weight:bold;
    font-size:20px;
}
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand logo" href="#">PakMart</a>

<form class="d-flex w-50">
<input class="form-control" type="search" placeholder="Search products">
</form>
</div>
</nav>

<section class="hero">
<h1>Welcome to PakMart</h1>
<p>Your Online General Store</p>
</section>

<div class="container my-5">
<div class="row" id="products"></div>
</div>

<script type="module">

const products = [
{
name:"Cooking Oil",
price:850,
image:"https://images.unsplash.com/photo-1620706857370-e1b9770e8bb1?w=500"
},
{
name:"Rice Bag",
price:2500,
image:"https://images.unsplash.com/photo-1586201375761-83865001e31c?w=500"
},
{
name:"Tea Pack",
price:1200,
image:"https://images.unsplash.com/photo-1597318181409-cf64d0b5d8a2?w=500"
}
];

const container=document.getElementById("products");

products.forEach(product=>{
container.innerHTML+=`
<div class="col-md-4 mb-4">
<div class="product-card">
<img src="${product.image}">
<div class="p-3">
<h5>${product.name}</h5>
<p class="price">Rs ${product.price}</p>
<button class="btn btn-warning w-100">
Add To Cart
</button>
</div>
</div>
</div>
`;
});

</script>

</body>
</html>
