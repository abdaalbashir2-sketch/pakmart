<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PakMart</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:#f5f5f5;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="bg-orange-500 text-white p-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="text-3xl font-bold">PakMart</h1>

        <input
            type="text"
            placeholder="Search products..."
            class="w-1/2 p-2 rounded text-black"
        >

        <button class="bg-white text-orange-500 px-4 py-2 rounded">
            Cart
        </button>
    </div>
</nav>

<!-- Hero -->
<section class="bg-white py-16 text-center">
    <h2 class="text-5xl font-bold mb-4">
        Welcome to PakMart
    </h2>

    <p class="text-gray-600">
        Shop groceries, electronics, fashion and daily essentials
    </p>
</section>

<!-- Categories -->
<section class="max-w-7xl mx-auto py-10">
    <h2 class="text-3xl font-bold mb-6">
        Categories
    </h2>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">

        <div class="bg-white p-6 rounded shadow text-center">
            Groceries
        </div>

        <div class="bg-white p-6 rounded shadow text-center">
            Electronics
        </div>

        <div class="bg-white p-6 rounded shadow text-center">
            Fashion
        </div>

        <div class="bg-white p-6 rounded shadow text-center">
            Home
        </div>

    </div>
</section>

<!-- Products -->
<section class="max-w-7xl mx-auto py-10">
    <h2 class="text-3xl font-bold mb-6">
        Featured Products
    </h2>

    <div class="grid md:grid-cols-4 gap-6">

        <div class="bg-white rounded shadow p-4">
            <img src="https://picsum.photos/300" class="w-full rounded">
            <h3 class="font-bold mt-3">Sample Product</h3>
            <p class="text-orange-500 font-bold">Rs. 999</p>
            <button class="bg-orange-500 text-white w-full mt-3 py-2 rounded">
                Add to Cart
            </button>
        </div>

    </div>
</section>

<footer class="bg-gray-900 text-white text-center p-6">
    © 2026 PakMart
</footer>

</body>
</html>
